openapi: 3.1.0
info:
  title: SemanticStub Sample
  version: 1.0.0

paths:
  /hello:
    get:
      operationId: getHello
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                required:
                  - message
              example:
                message: Hello from SemanticStub