openapi: 3.1.0
info:
  title: Users API
  version: 1.0.0

paths:
  /users:
    get:
      operationId: listUsers
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: User list
          headers:
            X-Total-Count:
              description: Total available users
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                      required:
                        - id
                        - name
                required:
                  - users
              example:
                users:
                  - id: 1
                    name: Alice
                  - id: 2
                    name: Bob
          x-delay: 100
          x-response-file: users.json