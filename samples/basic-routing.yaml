openapi: 3.1.0
info:
  title: Basic Routing Sample
  version: 1.0.0

paths:
  /hello:
    get:
      operationId: getHello
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                required:
                  - message
              example:
                message: Hello from SemanticStub

  /users:
    get:
      operationId: listUsers
      x-match:
        - query:
            role: admin
          response:
            statusCode: 200
            content:
              application/json:
                example:
                  users:
                    - id: 1
                      name: Alice
                      role: admin

        - query:
            role: admin
            view: summary
          response:
            statusCode: 200
            content:
              application/json:
                example:
                  users:
                    - id: 1
                      name: Alice
                      role: admin
                      view: summary

        - query:
            role: guest
          response:
            statusCode: 200
            content:
              application/json:
                example:
                  users:
                    - id: 2
                      name: Bob
                      role: guest

        - query: {}
          response:
            statusCode: 200
            x-response-file: users.json
            content:
              application/json:
                example:
                  users:
                    - id: 1
                      name: Alice
                    - id: 2
                      name: Bob
      responses:
        '200':
          description: Default user list
          x-response-file: users.json
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                      required:
                        - id
                        - name
                required:
                  - users

  /login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
            example:
              username: demo
              password: secret
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  result:
                    type: string
                required:
                  - result
              example:
                result: ok
