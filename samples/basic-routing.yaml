openapi: 3.1.0
info:
  title: Basic Routing Sample
  version: 1.0.0

paths:
  /hello:
    get:
      operationId: getHello
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                required:
                  - message
              example:
                message: Hello from SemanticStub

  /users:
    get:
      operationId: listUsers
      x-match:
        - query:
            role: admin
          response:
            statusCode: 200
            content:
              application/json:
                example:
                  users:
                    - id: 1
                      name: Alice
                      role: admin

        - query:
            role: admin
            view: summary
          response:
            statusCode: 200
            content:
              application/json:
                example:
                  users:
                    - id: 1
                      name: Alice
                      role: admin
                      view: summary

        - query:
            role: guest
          response:
            statusCode: 200
            content:
              application/json:
                example:
                  users:
                    - id: 2
                      name: Bob
                      role: guest

      responses:
        '200':
          description: Default user list
          x-response-file: users.json
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                      required:
                        - id
                        - name
                required:
                  - users

  /environment-users:
    get:
      operationId: listEnvironmentUsers
      parameters:
        - name: X-Env
          in: header
          required: false
          schema:
            type: string
      x-match:
        - headers:
            X-Env: staging
          response:
            statusCode: 200
            content:
              application/json:
                example:
                  users:
                    - id: 3
                      name: Staging Alice
                      role: staging
      responses:
        '200':
          description: Default environment user list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        role:
                          type: string
                      required:
                        - id
                        - name
                        - role
                required:
                  - users
              example:
                users:
                  - id: 4
                    name: Default User
                    role: default

  /login:
    post:
      operationId: login
      x-match:
        - body:
            username: demo
            password: secret
          response:
            statusCode: 200
            content:
              application/json:
                example:
                  result: ok
                  token: demo-token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
            example:
              username: demo
              password: secret
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  result:
                    type: string
                  token:
                    type: string
                required:
                  - result
              example:
                result: invalid

  /profile:
    put:
      operationId: replaceProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                displayName:
                  type: string
              required:
                - displayName
            example:
              displayName: Updated User
      responses:
        '200':
          description: Profile replaced
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  result:
                    type: string
                required:
                  - result
              example:
                result: replaced

    patch:
      operationId: patchProfile
      x-match:
        - body:
            nickname: stubby
          response:
            statusCode: 200
            content:
              application/json:
                example:
                  result: patched-specific
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                nickname:
                  type: string
      responses:
        '200':
          description: Profile patched
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  result:
                    type: string
                required:
                  - result
              example:
                result: patched

    delete:
      operationId: deleteProfile
      responses:
        '200':
          description: Profile deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  result:
                    type: string
                required:
                  - result
              example:
                result: deleted
