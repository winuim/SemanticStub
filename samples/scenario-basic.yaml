openapi: 3.1.0
info:
  title: Scenario Example
  version: 1.0.0

paths:
  /login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
            example:
              username: demo
              password: secret
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  result:
                    type: string
                required:
                  - result
              example:
                result: ok
          x-scenario:
            name: login-flow
            state: initial
            next: logged-in

        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
                required:
                  - error
              example:
                error: invalid credentials
          x-scenario:
            name: login-flow
            state: initial