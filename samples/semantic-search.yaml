openapi: 3.1.0
info:
  title: Semantic Search Example
  version: 1.0.0

paths:
  /search:
    post:
      operationId: semanticSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                query:
                  type: string
              required:
                - query
            example:
              query: find user by email
      responses:
        '200':
          description: Search result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  result:
                    type: string
                  score:
                    type: number
                required:
                  - result
              example:
                result: matched
                score: 0.91
          x-semantic-match:
            field: requestBody.query
            threshold: 0.8